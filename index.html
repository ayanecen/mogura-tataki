<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おしゃれでかわいいモグラ叩き</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>モグラ叩き</h1>
            <div class="controls">
                <select id="difficulty" aria-label="難易度選択">
                    <option value="easy">かんたん</option>
                    <option value="normal" selected>ふつう</option>
                    <option value="hard">むずかしい</option>
                </select>
                <button id="sound-toggle" aria-label="サウンド切り替え">🔊 ON</button>
            </div>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <span class="label">スコア</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="stat-card">
                <span class="label">タイム</span>
                <span id="timer" class="value">60</span>
            </div>
        </div>

        <main id="game-board" class="game-board">
            <!-- Holes will be generated by JS -->
        </main>

        <footer>
            <button id="start-button">ゲームスタート</button>
        </footer>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2>終了！</h2>
            <p>あなたのスコアは <span id="final-score">0</span> 点でした！</p>
            <button id="restart-button">もう一度あそぶ</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
